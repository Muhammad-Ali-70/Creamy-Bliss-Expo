<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b6c",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221016",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center">
<div class="relative flex min-h-screen w-full max-w-md flex-col overflow-x-hidden bg-background-light dark:bg-background-dark pb-8">
<div class="flex items-center p-4 pb-2 justify-between mt-4">
<button aria-label="Go back" class="flex size-12 shrink-0 items-center justify-center text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Login</h2>
</div>
<div class="px-4 py-6 flex flex-col items-center">
<div class="w-32 h-32 rounded-full mb-6 bg-cover bg-center" data-alt="Ice cream cone illustration" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAVKPwVN94ao-nCc_aqUzpYwFUgoBOKMmsWI7lXWId_zJHLlx9wT0R5v0rjJ7xBBEH_yPMgRj1jfRUGvaaRT3ywoxr5zHHqzSwoNazfqbzxY_FOIc8WLIGoypfrhwZOt68OLsdHaZ7_uTp59Bn1TQFrhmLEXFuTagbYyr4e8I4MUuX1T6C0FLos21AArqIlsesaoXTEjAslDbRXfZECAgQwHCLzJGaQUoXUvrR04g7E1VmRmNLqYfidiTMJdms5W1XYc8T4uuLTnKU");'></div>
<h1 class="text-2xl font-bold leading-tight tracking-tight text-center pb-2">Welcome Back!</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm text-center mb-6">Sign in to get your sweet treats.</p>
</div>
<div class="flex flex-col gap-4 px-6">
<label class="flex flex-col w-full">
<p class="text-sm font-semibold leading-normal pb-2 text-slate-700 dark:text-slate-300">Email Address</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border border-primary/30 dark:border-primary/50 bg-white dark:bg-slate-900 focus:border-primary h-14 placeholder:text-slate-400 p-4 text-base font-normal shadow-sm" placeholder="Enter your email" type="email"/>
</label>
<label class="flex flex-col w-full">
<p class="text-sm font-semibold leading-normal pb-2 text-slate-700 dark:text-slate-300">Password</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border border-primary/30 dark:border-primary/50 bg-white dark:bg-slate-900 focus:border-primary h-14 placeholder:text-slate-400 p-4 text-base font-normal shadow-sm" placeholder="Enter your password" type="password"/>
</label>
<div class="flex justify-end w-full">
<a class="text-sm font-medium text-[#4A90E2] hover:text-[#357ABD]" href="#">Forgot Password?</a>
</div>
</div>
<div class="px-6 mt-8 flex flex-col gap-4">
<button class="w-full h-14 bg-primary text-white font-bold text-lg rounded-xl shadow-md flex items-center justify-center hover:bg-primary/90 transition-colors">
                Login
            </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 text-sm">or</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<button class="w-full h-14 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold text-base rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-center gap-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
</div>
<div class="mt-auto pt-8 px-6 pb-6 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                Don't have an account? 
                <a class="font-bold text-[#4A90E2] hover:text-[#357ABD]" href="#">Create account</a>
</p>
</div>
</div>
</body></html>
